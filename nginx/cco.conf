# =============================================================
# Nginx — Sistema CCO
# Arquivo: /etc/nginx/sites-available/cco
#
# Habilitar:
#   ln -s /etc/nginx/sites-available/cco /etc/nginx/sites-enabled/cco
#   nginx -t && systemctl reload nginx
#
# Pré-requisitos:
#   - Certbot: sudo certbot --nginx -d seudominio.com.br -d www.seudominio.com.br
#   - Frontend buildado em: /var/www/cco/frontend/dist
#   - Backend PM2 rodando em: localhost:5001
# =============================================================

# ── Limite de taxa para rotas sensíveis ──────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ── Redireciona HTTP → HTTPS ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name seudominio.com.br www.seudominio.com.br;

    # Desafio ACME (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seudominio.com.br www.seudominio.com.br;

    # Certificados SSL (gerados pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seudominio.com.br/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/seudominio.com.br/chain.pem;

    # Parâmetros SSL modernos
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Cabeçalhos de segurança ───────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self';" always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ── Tamanho máximo de upload ─────────────────────────────
    client_max_body_size 20M;

    # ── Frontend (SPA — React/Vite) ───────────────────────────
    root /var/www/cco/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache de assets estáticos com hash no nome
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API Backend (proxy reverso) ───────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Desabilita buffering para SSE / streaming
        proxy_buffering off;
    }

    # ── Rate limiting extra para /api/auth/login ─────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;

        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploads gerados pelo backend ─────────────────────────
    location /uploads/ {
        alias /var/www/cco/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        # Proíbe execução de scripts em uploads
        location ~* \.(php|pl|py|sh|cgi)$ {
            deny all;
        }
    }

    # ── Oculta arquivos sensíveis ─────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/cco-access.log;
    error_log  /var/log/nginx/cco-error.log;
}
