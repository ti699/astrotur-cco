# =============================================================
# docker-compose.yml — Sistema CCO
#
# Uso:
#   docker compose up -d          # inicia todos os serviços
#   docker compose logs -f        # acompanha logs
#   docker compose down           # para e remove containers
#   docker compose down -v        # também remove volumes (APAGA DADOS!)
# =============================================================
version: '3.9'

services:
  # ── PostgreSQL 15 ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cco_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cco_db
      POSTGRES_USER:     cco_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TROQUE_ESTA_SENHA}
    ports:
      - "127.0.0.1:5432:5432"    # expõe apenas para localhost; Nginx faz proxy da API
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/functions:/docker-entrypoint-initdb.d/functions:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cco_user -d cco_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cco_net

  # ── Backend Node.js ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cco_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://cco_user:${POSTGRES_PASSWORD:-TROQUE_ESTA_SENHA}@postgres:5432/cco_db
      PORT: 5001
      NODE_ENV: production
    ports:
      - "127.0.0.1:5001:5001"    # Nginx fará proxy reverso
    volumes:
      - uploads_data:/app/uploads
      - /var/log/cco:/var/log/cco
    networks:
      - cco_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Volumes persistentes ──────────────────────────────────────
volumes:
  postgres_data:
    name: cco_postgres_data
  uploads_data:
    name: cco_uploads_data

# ── Rede interna ──────────────────────────────────────────────
networks:
  cco_net:
    driver: bridge
    name: cco_network
